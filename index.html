/* The flip card container - set the width and height to whatever you want. We have added the border property to demonstrate that the flip itself goes out of the box on hover (remove perspective if you don't want the 3D effect */
.flip-coin {
  background-color: transparent;
  min-width: 6em;
  min-height: 10em;
  perspective: 1000px; /* Remove this if you don't want the 3D effect */
}

/* This container is needed to position the front and back side */

  width: 100%;
  height: 100%;
  text-align: center;

  transform-style: preserve-3d;

.flipped:hover {
  transform: rotateY(0deg);
}

function pretty (obj) {

function quickTest (t1, t2, comment, level = 5) {
  if (t1 !== t2) {
    error(`${comment}failed: ${pretty(t1)} should be equal to ${pretty(t2)}`, level);

}
function oxfordCommaList (arr) {
  if (arr.length < 3) {
    return arr.join(" and ");
  } else {
    return arr.slice(0, -1).join(", ") + ", and " + arr.slice(-1);
  }
}
quickTest(oxfordCommaList([1, 2]), "1 and 2", `oxfordCommaList() for less than three entries`)

function intersect(a, b) {
  // Return elements of array a that are also in b in linear time:
  // via https://stackoverflow.com/a/43820518
  return a.filter(Set.prototype.has, new Set(b));
}

function assignDown (target, source) {
  // applies the properties from the source to the target, two levels down
  // assumes that the target already has all the keys the source does
  let n = copy(target);
  for (const [k1, v1] of Object.entries(copy(source))) {
    for (const [k2, v2] of Object.entries(v1)) {
      //log(`k1:${k1} k2:${k2} v2:${v2}`);
      n[k1][k2] = v2;

  var i = 0;
  while (i < arr.length) {
    if (arr[i] === value) {
      arr.splice(i, 1);
    } else {
      ++i;
    }
  }
  return arr;
}
function updateUrl (paramsObj = {}) {
  // set new url parameters
  function newUrl (paramsObj = {}) {
    // #later check to make sure there's no '#' in any of the paramsObj values
    let params = new URLSearchParams(window.location.search)
    for (const [key, value] of Object.entries(paramsObj)) {
      if (value !== '') {
        let encodedKey = encodeURIComponent(key, "UTF-8");
        let encodedVal = encodeURIComponent(value, "UTF-8");
        params.set(encodedKey, encodedVal);
      } else {
        params.delete(key)
      }
    }
    return `${window.location.origin}${window.location.pathname}?${params.toString()}`
  }
  // #later learn how/where the state information (here {}) can be accessed

}

  // decodes the encoding that updateUrl uses

  return decodeURIComponent(urlParams.get(key).replace(/\+/g, " "));
}
function splitByEach (string, breakAt = ", ") {
  let br = '<!split!>'
  return replaceEach(string, breakAt, br).split(br).filter(a => (a !== ''));
}
function regExEscape (string) {
  // via https://makandracards.com/makandra/15879-javascript-how-to-generate-a-regular-expression-from-a-string
  return string.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
}
function replaceEach (string, charsString, replaceWith = '') {
  charsString.split('').forEach(c => { string = string.replaceAll(c, replaceWith) });
  return string;
}
function occurs (string, substring) {
  let regex = new RegExp(regExEscape(substring), 'g')
  let matches = string.match(regex)
  if (matches) { return matches.length } else { return 0 }
}
function seeded (s) {
  // very much not actually random, but that's ok!
  // via https://stackoverflow.com/a/23304189
  // usage:
  // var random1 = seeded(42);
  // var random2 = seeded(random1());
  // Math.random = seeded(random2());
  // ^ that last may cause serious issues but could also be handy
  return function () {
    // tinkering with the number of 0s can tweak the distribution
    s = Math.sin(s) * 10000; return s - Math.floor(s);
  };
};

// = Ordering =
function digits () {
  let arr = []
  for (a = 1; a <= 9; a++) {
    arr.push(a + '')
  }
  arr.push('*')
  return arr;
}
function digitIndex (d) {
  return digits().indexOf(d + '');
}
function sortCallsign (callsign) {
  // sorts digits within a callsign
  let key = callsign + '';
  if (key.length > 1) {
    key = sortByCallsign(key.split('')).join('');
  }
  return key;
}
function sortByCallsign (arr) {
  // sorts and deduplicates a callsign list
  function compare (x, y) {
    function c (d, i) {
      return digitIndex((d + '').charAt(i));
    }
    if (x.length !== y.length) {
      return x.length - y.length;
    } else {
      for(i = 0; i <= x.length; i++){
        if (c(x, i) !== c(y, i)) {
          return c(x, i) - c(y, i);
        }
      }
      return 0;
    }
  }
  return [...new Set(arr)].sort(compare);
}

// Regex from display_name:
function regExFromDisplayName (exp, pk, index = 0) {
  let fallback = "Unknown {?} they/them"
  let name = pk.display_name || pk.name || fallback;
  let match = exp.exec(name)
  if (match && match[index]) {
    return match[index]
  } else {
    //log(`Using fallback value for ${name} with regex ${exp}`)
    return exp.exec(fallback)[index]
  }
}
function getCallsign (pk, index = 1) {

  return regExFromDisplayName(/[\{\[](.+)[\}\]]/, pk, index)
}
function getNickname (pk) {
  // Note: Returned value does not include any parentheticals
  return regExFromDisplayName(/^([\w\s]+)(?= |$)/, pk, 1)
}

// sets an object that describes our system architecture and returns an array of callsigns
// #later depreciate/remove?
function makeInitialList () {
  let headmates = {}
  let count = 0;
  let baseNum = data.setup.digits;
  let cap = 4; // n-fusion maximum

  function newMember (callsign) {
    headmates[callsign + ''] = {
      big_sibs: [],
      lil_sibs: [],
      sibs: []
    };
    count++;
  }
  function mergeEntries (a, b) {
    // @later why does removing the length from here cause an infinite loop?
    let combined = (a + '' + b);
    let key = sortCallsign(combined);
    if (a !== b && key.length <= cap && combined.length == key.length) {
      let A = headmates[a].lil_sibs;
      let B = headmates[b].lil_sibs;
      let C = [];
      if (headmates.hasOwnProperty(key)){
        C = headmates[key].lil_sibs;
      } else {
        newMember(key);
      }
      headmates[key].lil_sibs = [a, b].concat(A, B, C);

      headmates[a].big_sibs.push(key);
      headmates[b].big_sibs.push(key);
    }
  }
  function addMergeGeneration () {
    let currentKeys = Object.keys(headmates);
    currentKeys.forEach(a => {
      currentKeys.forEach(b => {
        mergeEntries(a, b);
      });
    });
  }
  function dedupCallsigns () {
    for (const [key, value] of Object.entries(headmates)) {
      for (const [p, list] of Object.entries(value)) {
        if (Array.isArray(list)) {
          headmates[key][p] = sortByCallsign(list);
        }
      }
    }
  }

  // make an initial generation then recursively combine
  digits().forEach(newMember);
  for (g = 0; g < cap; g++) {
    addMergeGeneration();
    dedupCallsigns();
  }

  // fill in all sibs
  function fillInSiblings (key) {
    let sibs = [];

    function addSibs (sibKey) {
      let lilSib = headmates[key].lil_sibs.includes(sibKey);
      let bigSib = headmates[key].big_sibs.includes(sibKey)
      if (!lilSib & !bigSib) {
        sibs.push(sibKey);
      }
    }

    // add each digit in the callsign as a little sibling
    if (key.length > 1) {
      key.split('').forEach(a => {
        // @todo add support for multi-part lil_sibs?
        headmates[a].big_sibs.forEach(addSibs);
      });
    }

    // deduplicate and sort the sibling array
    sibs = sortByCallsign(sibs);

    // remove sibling ties to self
    if (sibs.indexOf(key) >= 0) {
      sibs.splice(sibs.indexOf(key), 1);
    }

    headmates[key].sibs = sibs;
  }

  let allNumericalCallsigns = copy(Object.keys(headmates));
  allNumericalCallsigns.forEach(fillInSiblings)

  // add unconventional headmates
  // see https://dash.pluralkit.me/dash?tab=groups&view=list
  headmates["A"] = { sibs: allNumericalCallsigns }

  let unconventionals = ["?", "H", "C", "#", "^"];
  unconventionals.forEach(cs => {
    headmates[cs] = {}
  });

  data.structure.relatives = headmates;
  return Object.keys(headmates);
}

{
// see https://www.javascripttutorial.net/javascript-fetch-api/
// requires an auth token set to pkToken variable

let totalRequests = 0;
let currentRequests = 0;
let requestAfter = 0;
let rootUrl = "https://api.pluralkit.me/v2"

function basicAuth (neccessary) {
  if (data.setup.token === '' && neccessary) {
    // #todo add a better way to resolve invalid token input here
    while (data.setup.token === '') {
      inputToken()
    }
  }
  return { headers: { Authorization: data.setup.token } }
}

async function delayedFetch (url, data) {
  // see https://stackoverflow.com/questions/38956121/how-to-add-delay-to-promise-inside-then
  totalRequests++
  let num = totalRequests;
  currentRequests++
  if (currentRequests > 10) {
    log(`There's ${currentRequests} requests stacked up so let's export and re-import instead maybe? That's a lot to do all at once.`, 9)
  } else {
    let min = 1500;
    let now = new Date().getTime();
    let waitFor = 0;
    if (requestAfter > now) {
      waitFor = requestAfter - now;
      requestAfter = requestAfter + min;
    } else {
      requestAfter = now + min;
    }
    log(`Setting up request ${totalRequests} with delay: ${waitFor} (${currentRequests} requests cued up)`)
    await new Promise(resolve => setTimeout(resolve, waitFor));
    log(`Sending API request ${num}`);
    let result = await fetch(url, data);
    log(`Received API request ${num}`);
    currentRequests--
    return result;
  }
}

function listRelated (activeList, allMembers = getMemberList()) {
  // Takes as input an array of pkIds to look for relations of and a list of members to search within and returns a list of pkIds for all members in the second array unrelated to members of the first array

  // Get just the letters from the active member's callsigns
  let activeAtoms = activeList.map(pkId => getCallsign(getPkObject(pkId))).join("").match(/(\w)/g)

  // Filter member list to exclude related members
  function getAtoms(pkId) { return getCallsign(getPkObject(pkId)).match(/(\w)/g) || [] }
  let unrelatedMembers = allMembers.filter(pkId => {
    // Check for overlap
    return intersect(getAtoms(pkId), activeAtoms).length != 0
  });

  return unrelatedMembers
}
function listActive (searchString = data.page.active_list.value) {
  // Takes a string of comma or otherwise separated search terms
  // Returns a list of pkIds for direct matches from search input
  // Usually called from the text box, can also be from URL params
  let searchTerms = splitIntoTerms(searchString)
  // #todo make this less redundant/better organized later as this is also called in updateTileClasses()

  let foundMembers = searchTerms.filter(validMember).map(getMemberId)

  if (foundMembers.length == 0) { showMessage(`No direct matches found from search terms "${searchTerms.join('", "')}"`); }
  return [...new Set(foundMembers)] // deduplicates list just for neatness
}
function listElligible (searchTerms, memberList) {
  // Returns a list of pkIds for all members that satisfy wildcard search terms (like 38+ or G+)
  function hasAll (callsignChars, memberList) {
    // Checks to see if members in the memberList array contain all the callsign characters in the array
    function getCallsignChars(pkId) { return getCallsign(getPkObject(pkId)).normalize('NFKD').toLowerCase().split("") }

    // #todo test
    // Takes a string of callsign characters as input and returns a list of pkIds for members that have all of those present
    let required = callsignChars.length
    callsignChars = callsignChars.map(c => c.normalize('NFKD').toLowerCase())

    // Filter member list to only include members that have all the required callsign components
    let relatedMembers = memberList.filter(pkId => {
      // Check for overlap
      return intersect(getCallsignChars(pkId), callsignChars).length == required
    });

    return relatedMembers
  }

  let wildTerms = searchTerms.filter(t => t.slice(-1) == "+").map(t => t.slice(0, -1))
  if (wildTerms.length > 0) {
    log("Wild search terms: [\"" + wildTerms.join('", "') + '"]')
    let foundMembers = []

    wildTerms.forEach(t => {
      let callsignChars = t.split("")
      //log(callsignChars)
      foundMembers.push(...hasAll(callsignChars, memberList))
      //log(foundMembers)
    });

    if (foundMembers.length == 0) { showMessage(`No indirect matches found from search terms "${wildTerms.join('", "')}"`); }
    return [...new Set(foundMembers)] // deduplicates list just for neatness
  } else {
    return []
  }

function updateTileClasses (overrideList = []) {
  // #todo fix known issue, including "fronters" etc in search terms doesn't actually include them in results the way it should
  // Either use the override list directly or parse the search terms
  let activeMembers = []
  let unavailableMembers = []

  if (overrideList.length != 0) {
    // Set as active only members in the override list
    activeMembers = overrideList

    // Set as unavailable any related members to the override list members
    unavailableMembers = listRelated(activeMembers, getMemberList())
  } else {
    // Set as active any members that are direct matches to search terms
    activeMembers = listActive()

    let searchTerms = splitIntoTerms(data.page.active_list.value)

    // If no members qualify as active, bump up available members to active
    if (activeMembers.length == 0) {
      // This means there are no direct matches to the prompt

      // Set elligible members as active:
      //log("Search terms: [\"" + searchTerms.join('", "') + '"]')
      activeMembers = listElligible(searchTerms, getMemberList())
    } else {
      // #todo rewrite this to require less computation

      // Set as unavailable any inelligible members
      let elligible = listElligible(searchTerms, getMemberList())
      unavailableMembers.push(...getMemberList().filter(m => !elligible.includes(m)))

      // Set as unavailable any related members
      unavailableMembers.push(...listRelated(activeMembers, unavailableMembers))
    }
  }

  let showAvailable = getToggle("available")
  let showUnavailable = getToggle("unavailable")

  getMemberList().forEach(pkId => {
    let e = elementByPkId(pkId)
    if (e) { // accounting for tiles that may not be present
      let tileClass = "hidden"
      if (activeMembers.includes(pkId) || activeMembers.length === 0) {
        tileClass = "active"
      } else if (unavailableMembers.includes(pkId) && showUnavailable) {
        tileClass = "unavailable"
      } else if (showAvailable && !unavailableMembers.includes(pkId)) {
        tileClass = "available"
      }
      e.className = tileClass + ' flip-coin';
    }
  });
}

function nameChange (event) {
  // #todo test + troubleshoot
  // #todo use updateNameList() also
  function resetNameField () {
    if (oldName !== "Unnamed") {
      event.target.value = oldName;
    } else {
      event.target.value = '';
    }
  }
  let newName = event.target.value;
  let oldName = event.target.placeholder;
  log(`Name change event fired, comparing ${newName} to ${oldName}...`)
  if (newName !== '' && newName !== oldName) {
    let callsign = event.target.id.slice("name-for-".length)
    let isAlt = (event.target.id.slice("alt-name-".length) === "alt-name");
    if (isAlt) { callsign += "'" } // #later make this more elegant
    if (idFromCallsign(callsign)) {
      log(`Name change event fired for existing member with callsign ${callsign}...`)
      // a proxy exists:
      let prompt = `Change name for ${callsign} from ${oldName} to ${newName}?`
      if (oldName === "Unnamed") {
        prompt = `Change name for ${callsign} to ${newName}?`
      }
      if (confirm(prompt)) {
        // #todo also automatically update nickname note and add parenthetical
        event.target.placeholder = newName;
        let edits = { name: newName }
        let m = getPkObject(callsign)
        if (m.display_name) {
          edits.display_name = m.display_name.replace(oldName, newName);
        } else {
          edits.display_name = `${callsign} | ${newName}`;
        }
        edits.proxy_tags = m.proxy_tags;
        edits.proxy_tags.push(
          { prefix: null, suffix: " -" + newName },
          { prefix: newName + ": ", suffix: null }
        );
        editMember(m.id, edits);
      } else {
        resetNameField();
      }
    } else {
      log(`Name change event fired for new member with callsign ${callsign}...`)
      // #todo test
      if (confirm(`${callsign} doesn't have a registered proxy. Create one with this name: '${newName}'?`)) {
        log(`${callsign} doesn't have a registered proxy. Creating one with name ${newName} now...`);
        event.target.placeholder = newName;
        newMember(callsign, {
          name: newName,
          display_name: callsign + " | " + newName,
          proxy_tags: [
            // #todo add new proxy tags to existing ones
            { prefix: null, suffix: " -" + newName },
            { prefix: newName + ": ", suffix: null },
            { "prefix": null, "suffix": " -" + callsign },
            { "prefix": callsign + ": ", "suffix": null }
          ]
        })
      } else {
        resetNameField();
      }
    }
  }
}

function htmlIdStringByPkId (pkId) {
  // #todo consider if we need this at all when using PK Ids
  // see https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/encodeURIComponent
  return encodeURIComponent(pkId).replace(

  );
}

// #todo update local variable name, using PK ID now instead of callsigns
function updateHeadmateTile (pkId) {
  let pk = getPkObject(pkId);
  let idString = htmlIdStringByPkId(pkId);
  function nameElement (type) {
    let element = document.createElement("div");
    element.id = `name-${type}-${idString}`;

    // Set visible callsign
    // #todo adjust for alt accounts?
    // #todo set smaller font for longer callsigns?
    element.innerHTML = getCallsign(pk, 0);

    // Make editable nickname field
    let nickname = getNickname(pk);
    let nicknameElement = document.createElement("div");
    if (getToggle("editing")) {
      nicknameElement = document.createElement("input");
      nicknameElement.addEventListener("focusout", nameChange);
      nicknameElement.addEventListener("keypress", function(event) {
        // If the user presses the "Enter" key on the keyboard
        if (event.key === "Enter") {
          // Cancel the default action, if needed
          event.preventDefault();
          nameChange(event);
        }
      });
      if (nickname !== "Unnamed") {
        nicknameElement.defaultValue = nickname;
        nicknameElement.value = nickname;
        nicknameElement.placeholder = nickname; // used to detect name changes
      } else {
        nicknameElement.placeholder = nickname;
      }
    } else {
      nicknameElement.textContent = nickname; // for non-editing mode
    }
    nicknameElement.classList.add("name");

    if (type === "front") {
      nicknameElement.id = `name-for-${idString}`
    } else {
      nicknameElement.id = `alt-name-for-${idString}`
    }
    element.appendChild(nicknameElement);

    /*
    let lastname = document.createElement("div");
    lastname.className = "last-name"
    lastname.innerHTML += `${lastNameGenerator(mainCs)}`;
    element.appendChild(lastname);
    */
    return element;
  }
  function setAvatar (element) {
    // #todo add last fronted date to the title as well

    element.title = getPronouns(pk) + '\n(double click to open the PK page for this member)'
    let url = getAvatarURL(pk);
    // #todo detect broken image urls
    if (url) {
      element.style.backgroundImage = `url('${url}')`
      //element.onerror = function(e){ log("broken") } // not working
      element.style.boxShadow = "none";
    } else {
      // @later add default image (color shifted glitter lattice?)
      element.style.boxShadow = "inset 1em 1em 1em black";
      // syntax: h-shadow v-shadow blur spread color
    }
    element.style.backgroundColor = getBgColor(pk.id);
  }
  function updateBothSides () {
    // #todo consider throwing an error here if the elements are not found
    ["front", "back"].forEach(type => {
      let name = document.getElementById(`name-${type}-${idString}`);
      if (name) { name.replaceWith(nameElement(type)) }

      let icon = document.getElementById(`icon-${type}-${idString}`);
      if (icon) { setAvatar(icon) }
    });
  }

  // Check if the coin exists; if not, create one
  if (!elementByPkId(pkId)) { addHeadmateTile(pkId) }

  updateBothSides();
  return true;
}

function ui_toast (newText = "", level = 0, type = "success") {
    /* @author https://www.w3schools.com/howto/howto_js_snackbar.asp */

    // Get the alerts DIV
    var x = document.getElementById("alerts");
  
    let n = document.createElement("div");
    n.className = "message";
    x.appendChild(n);

    if (type == "error") { newText = "⚠️ " + newText }
    n.innerText = newText;

    // Add the "show" class to DIV
    x.className = "show";

    // After 6 seconds, remove the show class from DIV
    setTimeout(function(){ x.className = x.className.replace("show", ""); }, 6000);
}

function ui_setFooter (newText) {
    var x = document.getElementById("footer");
    x.innerText = newText;
}

// Simple flavored toasts
function log (text = "?", level = 0) {
    ui_toast(text, level);
    return text;
}
function info (text = "?", level = 1) {
    ui_toast(text, level);
    return text;
}
function error (e, level = 3) {
    if (e.stack) {
      let shortStack = e.stack.replaceAll(/content.+\/(.+?html)/g, (full, p1) => (p1 || full));
      e = e.message + "\n" + shortStack;
    }
    ui_toast(e, level, "error");
    return text;
}
function warn (text, level = 2) {
    ui_toast(text, level, "error");
    return text;
}

// Substitute console functions with toasts instead
window.console = {
        log:   (text) => log(text),
        info:  (text) => info(text),
        warn:  (text) => warn(text),
        error: (text) => error(text)
    };
